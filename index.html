<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matura App - Interaktywny Quiz</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background: #f4f7f6; }
    .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .btn { padding: 10px 15px; margin: 5px; border-radius: 8px; border: none; background: #007bff; color: white; cursor: pointer; }
    .btn:disabled { background: #ccc; }
    .btn-back { background: #6c757d; }
    textarea { width: 100%; height: 150px; padding: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
    .tabs { margin: 20px 0; border-bottom: 2px solid #eee; }
    .tab { padding: 10px 20px; display: inline-block; cursor: pointer; background: #eee; margin-right: 5px; border-radius: 8px 8px 0 0; }
    .tab.active { background: #007bff; color: white; }
    
    /* Style Quizu */
    .quiz-item { background: #fff; padding: 15px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #ddd; }
    .answer-item { 
      padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; 
      transition: 0.2s; cursor: pointer; background: #fdfdfd; 
    }
    .answer-item:hover { background: #f0f7ff; border-color: #007bff; }
    .correct { background: #d4edda !important; border-color: #28a745 !important; color: #155724; }
    .wrong { background: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }
    .feedback { margin-top: 10px; font-weight: bold; }
  </style>
</head>
<body>
<div class="container" id="app"></div>

<script>
// 1. WCZYTYWANIE DANYCH (System odporny na resety)
let data = JSON.parse(localStorage.getItem("maturaApp")) || {
  subjects: [
    { name: "Matematyka", topics: [] },
    { name: "Polski", topics: [] },
    { name: "Angielski", topics: [] }
  ]
};

let subjectIndex = null;
let topicIndex = null;
let activeTab = "theory";
let isLoading = false;

function save() {
  localStorage.setItem("maturaApp", JSON.stringify(data));
}

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  if (subjectIndex === null) {
    app.innerHTML += "<h1>Twoja Nauka</h1>";
    data.subjects.forEach((s, i) => {
      app.innerHTML += `<button class='btn' onclick='openSubject(${i})'>${s.name}</button>`;
    });
    return;
  }

  const subj = data.subjects[subjectIndex];
  if (topicIndex === null) {
    app.innerHTML += `<button class='btn btn-back' onclick='back()'>⬅️ Przedmioty</button><h2>${subj.name}</h2>`;
    app.innerHTML += `<button class='btn' style='background:#28a745' onclick='addTopic()'>➕ Dodaj dział</button><br><br>`;
    subj.topics.forEach((t, i) => {
      app.innerHTML += `<button class='btn' onclick='openTopic(${i})'>${t.name}</button>`;
    });
    return;
  }

  const topic = subj.topics[topicIndex];
  app.innerHTML += `<button class='btn btn-back' onclick='backTopic()'>⬅️ Lista działów</button><h2>${topic.name}</h2>`;

  app.innerHTML += `
    <div class="tabs">
      <div class="tab ${activeTab==='theory'?'active':''}" onclick="setTab('theory')">📘 Teoria</div>
      <div class="tab ${activeTab==='quiz'?'active':''}" onclick="setTab('quiz')">🧠 Quiz AI</div>
    </div>
  `;

  if (activeTab === "theory") {
    app.innerHTML += `
      <textarea oninput='saveTheory(this.value)' placeholder="Wklej tutaj notatki...">${topic.theory || ""}</textarea>
    `;
  }

  if (activeTab === "quiz") {
    app.innerHTML += `
      <button class='btn' onclick='generateQuiz()' ${isLoading ? 'disabled' : ''}>
        ${isLoading ? 'Generowanie pytań...' : '✨ Generuj Quiz Gemini 3'}
      </button>
      <div id="quiz-container"></div>
    `;
    renderQuizItems(topic.quiz);
  }
}

function renderQuizItems(quiz) {
  const container = document.getElementById("quiz-container");
  if (!quiz || quiz.length === 0) return;

  quiz.forEach((q, qIdx) => {
    const div = document.createElement("div");
    div.className = "quiz-item";
    
    let optionsHtml = q.answers.map((ans, aIdx) => {
      const letter = String.fromCharCode(65 + aIdx); // A, B, C, D
      return `<div class="answer-item" onclick="checkAnswer(this, '${letter}', '${q.correct}', ${qIdx})">
                <strong>${letter}:</strong> ${ans}
              </div>`;
    }).join("");

    div.innerHTML = `
      <p><strong>Pytanie ${qIdx + 1}:</strong> ${q.question}</p>
      ${optionsHtml}
      <div id="feedback-${qIdx}" class="feedback"></div>
      <div id="expl-${qIdx}" style="display:none; font-size: 0.9em; color: #555; margin-top:10px;">
        <strong>Wyjaśnienie:</strong> ${q.explanation}
      </div>
    `;
    container.appendChild(div);
  });
}

// Funkcja sprawdzania odpowiedzi
function checkAnswer(element, selected, correct, qIdx) {
  const feedback = document.getElementById(`feedback-${qIdx}`);
  const explanation = document.getElementById(`expl-${qIdx}`);
  
  if (selected === correct) {
    element.classList.add("correct");
    feedback.innerHTML = "✅ Świetnie! To poprawna odpowiedź.";
    feedback.style.color = "green";
  } else {
    element.classList.add("wrong");
    feedback.innerHTML = `❌ Błąd. Poprawna odpowiedź to ${correct}.`;
    feedback.style.color = "#dc3545";
  }
  
  explanation.style.display = "block";
  // Blokada ponownego klikania w tym pytaniu
  const parent = element.parentElement;
  parent.style.pointerEvents = "none";
}

// Logika nawigacji i zapisu
function setTab(tab) { activeTab = tab; render(); }
function openSubject(i) { subjectIndex = i; render(); }
function openTopic(i) { topicIndex = i; render(); }
function back() { subjectIndex = null; render(); }
function backTopic() { topicIndex = null; render(); }

function addTopic() {
  const name = prompt("Nazwa działu:");
  if (!name) return;
  data.subjects[subjectIndex].topics.push({ name, theory:"", quiz:[] });
  save(); render();
}

function saveTheory(val) {
  data.subjects[subjectIndex].topics[topicIndex].theory = val;
  save();
}

async function generateQuiz() {
  const topic = data.subjects[subjectIndex].topics[topicIndex];
  isLoading = true; render();

  try {
    const res = await fetch("/api/quiz", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ topic: topic.name })
    });
    const result = await res.json();
    if (!res.ok) throw new Error(result.error);
    
    topic.quiz = result.text;
    save();
  } catch (err) {
    alert("Błąd: " + err.message);
  } finally {
    isLoading = false; render();
  }
}

render();
</script>
</body>
</html>
